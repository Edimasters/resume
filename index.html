        cta_btn: "Написать в Telegram", cta_text: "Открыт к предложениям на позиции Project / Product & Delivery Manager.",
        footer_copy: "© Эдгар Джагарян | Project & Delivery Manager"
      }
    };

    let currentLang = localStorage.getItem('resume-lang') || 'en';
    const langBtn = document.getElementById('lang-toggle');

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('resume-lang', lang);
      document.documentElement.lang = lang;
      langBtn.textContent = lang === 'en' ? 'RU' : 'EN';
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = i18n[lang]?.[key];
        if (val) {
          el.innerHTML = val;
        }
      });
    }

    langBtn.addEventListener('click', () => applyLang(currentLang === 'en' ? 'ru' : 'en'));
    document.addEventListener('DOMContentLoaded', () => applyLang(currentLang));
  </script>
